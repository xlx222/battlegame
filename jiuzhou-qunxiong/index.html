<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>九州群雄 - 原型</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>《九州群雄》Prototype</h1>
      <div class="top-actions">
        <label>存档位
          <select id="slotPicker"></select>
        </label>
        <button id="saveBtn">存档</button>
        <button id="loadBtn">读档</button>
      </div>
    </header>

    <section id="menuScreen" class="screen active">
      <h2>主菜单</h2>
      <div class="menu-buttons">
        <label>剧本
          <select id="scenarioSelect"></select>
        </label>
        <button id="newGameBtn">开始所选剧本</button>
        <button id="loadMenuBtn">读取存档</button>
        <button id="exitBtn">退出游戏</button>
      </div>
      <p class="hint">热座模式：准备/行动双阶段，新增商店、招揽、名录和技能入口。</p>
    </section>

    <section id="gameScreen" class="screen">
      <aside class="panel left-panel">
        <h3>回合信息</h3>
        <div id="turnInfo"></div>
        <h3>当前势力</h3>
        <div id="factionInfo"></div>
        <h3>当前选中城池（基础）</h3>
        <div id="leftCityInfo">请点击地图中的城池</div>
        <h3>当前选中军团兵力构成</h3>
        <div id="leftArmyDetail">请点击地图中的军团</div>
        <h3>操作</h3>
        <div class="actions">
          <button id="incomeBtn">准备：领取收入</button>
          <button id="recruitBtn">准备：征兵(+1000)</button>
          <button id="shopBtn">准备：进入商店</button>
          <button id="hireBtn">准备：招揽武将(-4000)</button>
          <button id="castCitySkillBtn">准备：名录中发动技能</button>
          <button id="endPrepBtn">结束准备</button>
          <button id="moveBtn">行动：移动</button>
          <button id="attackBtn">行动：野战</button>
          <button id="siegeBtn">行动：攻城</button>
          <button id="dispatchBtn">行动：名录派出军团</button>
          <button id="castArmySkillBtn">行动：军团名录发动技能</button>
          <button id="openCityCharactersBtn">打开人物目录（城池）</button>
          <button id="openWildCharactersBtn">打开在野军团目录</button>
          <button id="endActionBtn">结束行动</button>
        </div>
        <div class="status" id="statusLog"></div>
      </aside>

      <main>
        <div id="mapContainer">
          <div id="map"></div>
        </div>
        <section id="centerRosterPanel" class="overlay hidden">
          <div class="overlay-card">
            <div class="overlay-head">
              <h3 id="overlayTitle">人物名录</h3>
              <button id="closeOverlayBtn">关闭</button>
            </div>
            <table id="overlayTable">
              <thead>
                <tr>
                  <th>姓名</th>
                  <th>统帅</th>
                  <th>武力</th>
                  <th>政治</th>
                  <th>技能</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="overlayBody"></tbody>
            </table>
          </div>
        </section>
      </main>

      <aside class="panel right-panel">
        <h3>选中地块</h3>
        <div id="tileInfo">请点击地图地块</div>
        <h3>城池</h3>
        <div id="cityInfo"></div>
        <h3>城池人物名录（准备可配装）</h3>
        <div id="cityRoster" class="roster"></div>
        <h3>军团</h3>
        <div id="armyInfo"></div>
        <h3>行动军团人物名录（行动可放技能）</h3>
        <div id="armyRoster" class="roster"></div>
        <h3>存档位（20）</h3>
        <div id="saveSlots" class="save-slots"></div>
      </aside>
    </section>
  </div>

  <script src="game.js"></script>
</body>
</html>
